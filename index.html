<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smetana OS - Nullcel</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
</head>
<body>
    <a class="github" href="https://github.com/nullcel/smetana">
        <img src="github-mark.svg" width="30" height="30"></img>
    </a>

    <div class="container">
        
        <div class="content-wrapper">
            
            <p class="title" style="font-size: 60px;">Smetana</h1>
            <p class="version" style="font-style: italic; margin-top: -10px; font-size: 20px;">Version One Beta</h2>
            <div class="buttons"></div>
                <button class="button" data-type="isofile" onclick="window.location.href='https://google.com'">Download (x64_86)<br></button>
            </div>
        </div>
    </div>
    <div class="marqueecontainer" onclick="music()" onwheel="volume(event)">
        <pre>|</pre><Marquee id="marquee" scrollamount="8">nullcel.com</Marquee><pre>|</pre>
    </div>
</body>
<style>
    html, body {
        margin: 10px;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: Inter, arial, sans-serif;
        line-height: 1.15;
        background-color: rgb(255, 255, 255);
    }

    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 90vh;
        width: 100%; /* Added width */
    }

    .content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; /* Added justify-content */
        gap: 5px;
        width: 100%; /* Added width */
    }

    .title {
        display: block;
        text-align: center;
        font-size: 40px; /* Slightly reduced font size */
        line-height: 1;
        margin: 0;
        font-family: Inter, arial, sans-serif;
    }

    .buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%; /* Added width */
    }

    .buttons[data-astro-cid-ct3bgug4] {
        position: relative;
    }
    div {
        display: block;
        unicode-bidi: isolate;
    }
    :root {
        --background: #f4f4f4;
        --color-text: #000;
        --secondary-text-color: #8e8e8e;
        --button-background: #e1e1e1;
        --control-color: #e1e1e1;
        --window-shadow: inset 0 0 35px 16px #fff;
        --animation: cubic-bezier(.65,0,.35,1);
        --transition-duration: 0;
        --transition: var(--transition-duration) var(--animation);
    }

    h1 {
        margin: 0;
        padding: 0;
    }

    .buttons {
        &:before {
            bottom: 10px;
            right: -80px;
            transform: scaleX(-1);
        }
    }

    .buttons {
        &:after, &:before {
            background: url(/images/golf.gif);
            background-size: cover;
            content: "";
            height: 130px;
            position: absolute;
            width: 0px;
            z-index: 1;
        }
    }

    .button {
        background-color: var(--button-background);
        border: none;
        border-radius: 12px;
        box-sizing: border-box;
        color: var(--color-text);
        display: block;
        font-size: 20px;
        line-height: 100%;
        margin: 0 auto; /* Changed margin */
        min-width: 255px;
        padding: 20px;
        text-align: center;
        transition: background-color var(--transition), color var(--transition), opacity .15s var(--animation);
    }

    button, select {
        text-transform: none;
    }
    button, input {
        overflow: visible;
    }
    button, input, optgroup, select, textarea {
        font-family: inherit;
        font-size: 100%;
        line-height: 1.15;
        margin: 0;
    }
    button {
        appearance: auto;
        text-rendering: auto;
        color: buttontext;
        letter-spacing: normal;
        word-spacing: normal;
        line-height: normal;
        text-transform: none;
        text-indent: 0px;
        text-shadow: none;
        display: inline-block;
        text-align: center;
        cursor: default;
        box-sizing: border-box;
        background-color: buttonface;
        margin: 0em;
        padding-block: 1px;
        padding-inline: 6px;
        border-width: 2px;
        border-style: outset;
        border-color: buttonborder;
        border-image: initial;

        &:hover {
            cursor: pointer;
            opacity: .65
        }
    }
    .marqueecontainer {
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    width: 35%;
    left: 50%;
    bottom: 7%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 14px;
}
.marquee {
    width: 420px;
    overflow: hidden;
    display: inline-block;
    font-size: 15px;
    margin: 0;
    padding: 0;
    white-space: nowrap;
}
.center {
    position: fixed;
    text-align: center;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    padding-bottom: 50px;
}
.fade {
    position: absolute;
    animation: flyup 6s linear;
    white-space: nowrap;
    pointer-events: none;
}
.artwork {
    display: block;
    margin: auto;
}
.framed > img {
    height: 300px;
    width: auto;
    margin: 0 100px;
}
.framed {
    display: flex;
    align-items: center;
    justify-content: center;
}
.framed > a {
    padding: 0 10px;
    text-align: center;
}
@media (max-height: 700px) {
    .framed > img {
        display: none;
    }
    .artwork {
        margin-bottom: 20px;
    }
}
    @keyframes flyup {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-5000%); }
}
@keyframes bg-animation {
    0% { transform: translate(0,0) }
    10% { transform: translate(-5%,-5%) }
    20% { transform: translate(-10%,5%) }
    30% { transform: translate(5%,-10%) }
    40% { transform: translate(-5%,15%) }
    50% { transform: translate(-10%,5%) }
    60% { transform: translate(15%,0) }
    70% { transform: translate(0,10%) }
    80% { transform: translate(-15%,0) }
    90% { transform: translate(10%,5%) }
    100% { transform: translate(5%,0) }
}
</style>
</html>
